<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}17 Agustus Desa Kita{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/logo.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/about.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/search.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/mobile.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/hero-carousel.css') }}">
</head>
<body>
  <header class="navbar">
    <a class="brand brand-hut" href="{{ url_for('index') }}">
      <img src="{{ url_for('static', filename='images/logo-hut-ri-81.png') }}" alt="Logo HUT RI 81 Indonesia Berdaulat">
    </a>
    <nav>
      <a class="active" href="{{ url_for('index') }}">Beranda</a>
      <a href="{{ url_for('index') }}#galeri">Foto</a>
      <a href="{{ url_for('index') }}#event">Event</a>
      <a href="{{ url_for('about') }}">Tentang</a>
    </nav>
    <div class="nav-tools">
      <form class="search" method="get" action="{{ url_for('index') }}">
        <button class="search-submit" type="submit" aria-label="Cari event">⌕</button>
        <input id="searchInput" name="q" type="search" placeholder="Cari event..." value="{{ request.args.get('q', '') }}" autocomplete="off">
      </form>
      <img class="permata-logo" src="{{ url_for('static', filename='images/logo-permata.png') }}" alt="Logo Karang Taruna Permata">
    </div>
  </header>
  {% block content %}{% endblock %}
  <footer>© {{ year }} Create By Tuan Vallen . 17 Agustus Desa Taji · Dokumentasi kebersamaan warga</footer>
  <script src="{{ url_for('static', filename='js/search.js') }}"></script>
  <script src="{{ url_for('static', filename='js/hero-carousel.js') }}"></script>
</body>
</html>
